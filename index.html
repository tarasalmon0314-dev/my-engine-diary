<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Diary SNS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #15202b;
            --container-bg: #15202b;
            --primary-color: #1d9bf0;
            --text-color: #ffffff;
            --text-muted: #8899a6;
            --border-color: #38444d;
            --like-color: #f91880;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--container-bg);
            padding: 20px;
            box-sizing: border-box;
            border-bottom: 1px solid var(--border-color);
        }

        textarea {
            width: 100%;
            height: 100px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 15px;
            color: white;
            padding: 15px;
            font-size: 1.1rem;
            resize: none;
            box-sizing: border-box;
            outline: none;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
        }

        #postList {
            width: 100%;
            max-width: 500px;
        }

        .post-card {
            border-bottom: 1px solid var(--border-color);
            padding: 15px 10px;
            display: flex;
            gap: 12px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #253341;
            object-fit: cover;
        }

        .post-content {
            flex-grow: 1;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .username {
            font-weight: bold;
        }

        .post-time {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .post-text {
            line-height: 1.4;
            margin-bottom: 10px;
            word-wrap: break-word;
        }

        .like-button {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 0;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .like-button.active {
            color: var(--like-color);
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        </div>

    <div id="postList">
        </div>

    <script>
        // --- 1. 初期設定 ---
        const SUPABASE_URL = 'https://rbrpsccwwyldytcxmzae.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJicnBzY2N3d3lsZHl0Y3htemFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3Mzg1MzIsImV4cCI6MjA5NDMxNDUzMn0.lUHu3BcfTmLfkw_Cfp1yamnPoFzicKvQBBrugpjKB4Q';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const mainContainer = document.getElementById('mainContainer');
        const postList = document.getElementById('postList');

        window.onload = async function() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                renderApp(session.user);
                loadProfile(session.user.id);
                fetchDiaries(); // 全員の投稿を取得
            } else {
                renderLoginView();
            }
        };

        // --- 2. 画面描画 ---
        function renderLoginView() {
            mainContainer.innerHTML = `
                <h1 style="text-align:center; color:var(--primary-color);">English SNS</h1>
                <button onclick="login()" style="width:100%;">Login with Google</button>
            `;
        }

        function renderApp(user) {
            mainContainer.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <img src="" id="displayAvatar" class="avatar" style="width:40px; height:40px;">
                        <span id="displayUsername" style="font-weight:bold;">Loading...</span>
                    </div>
                    <button onclick="logout()" style="background:#38444d; padding:5px 12px; font-size:0.8rem;">Logout</button>
                </div>
                <div style="margin-bottom:15px; display:flex; gap:5px;">
                    <input type="text" id="usernameInput" placeholder="New name..." style="flex-grow:1; background:#253341; border:1px solid var(--border-color); color:white; border-radius:10px; padding:5px 10px;">
                    <button onclick="updateProfile()" style="padding:5px 15px;">Save</button>
                </div>
                <textarea id="diaryInput" placeholder="What's happening? (in English)"></textarea>
                <div style="text-align:right; margin-top:10px;">
                    <button onclick="postDiary()">Post</button>
                </div>
            `;
        }

        // --- 3. プロフィール・日記取得 ---
        async function loadProfile(userId) {
            const { data } = await _supabase.from('profiles').select('*').eq('id', userId).single();
            if (data) {
                document.getElementById('displayUsername').innerText = data.username || "No Name";
                document.getElementById('displayAvatar').src = data.avatar_url || "";
            }
        }

        async function fetchDiaries() {
            // postsとprofilesを合体させ、さらにlikesの数も数える
            const { data, error } = await _supabase
                .from('posts')
                .select('*, profiles(*), likes(count)')
                .order('created_at', { ascending: false });

            if (!error && data) {
                postList.innerHTML = "";
                const { data: { session } } = await _supabase.auth.getSession();
                
                data.forEach(post => {
                    displayPost(post, session?.user?.id);
                });
            }
        }

        function displayPost(post, currentUserId) {
            const name = post.profiles?.username || "Unknown";
            const icon = post.profiles?.avatar_url || "";
            const likeCount = post.likes?.[0]?.count || 0;

            const postCard = document.createElement('div');
            postCard.className = 'post-card';
            postCard.innerHTML = `
                <img src="${icon}" class="avatar">
                <div class="post-content">
                    <div class="post-header">
                        <span class="username">${name}</span>
                        <span class="post-time">${new Date(post.created_at).toLocaleString()}</span>
                    </div>
                    <div class="post-text">${post.text}</div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <button onclick="toggleLike(${post.id})" class="like-button">
                            ❤️ <span>${likeCount}</span> Good!
                        </button>
                        ${post.user_id === currentUserId ? `<button onclick="deletePost(${post.id})" style="background:none; border:none; color:var(--text-muted); cursor:pointer;">&times;</button>` : ''}
                    </div>
                </div>
            `;
            postList.appendChild(postCard);
        }

        // --- 4. アクション関数 ---
        async function postDiary() {
            const text = document.getElementById('diaryInput').value;
            const { data: { session } } = await _supabase.auth.getSession();
            if (!text || !session) return;

            await _supabase.from('posts').insert([{ text: text, user_id: session.user.id }]);
            document.getElementById('diaryInput').value = "";
            fetchDiaries();
        }

        async function toggleLike(postId) {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) return;

            const { data: existingLike } = await _supabase
                .from('likes')
                .select('*')
                .eq('post_id', postId)
                .eq('user_id', session.user.id)
                .single();

            if (existingLike) {
                await _supabase.from('likes').delete().eq('post_id', postId).eq('user_id', session.user.id);
            } else {
                await _supabase.from('likes').insert([{ post_id: postId, user_id: session.user.id }]);
            }
            fetchDiaries();
        }

        async function updateProfile() {
            const newName = document.getElementById('usernameInput').value;
            const { data: { session } } = await _supabase.auth.getSession();
            if (!newName || !session) return;

            await _supabase.from('profiles').upsert({ id: session.user.id, username: newName });
            loadProfile(session.user.id);
            fetchDiaries();
            alert("Name updated!");
        }

        async function login() { 
            await _supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: location.href } }); 
        }
        async function logout() { 
            await _supabase.auth.signOut(); 
            location.reload(); 
        }
        async function deletePost(id) {
            if (confirm("Delete?")) {
                await _supabase.from('posts').delete().eq('id', id);
                fetchDiaries();
            }
        }
    </script>
</body>
</html>
