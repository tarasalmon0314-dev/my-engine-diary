<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family English Diary</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #15202b;
            --primary-color: #1d9bf0;
            --text-color: #ffffff;
            --secondary-text: #8899a6;
            --border-color: #38444d;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 500px; padding-bottom: 50px; }
        header {
            width: 100%;
            padding: 15px;
            position: sticky;
            top: 0;
            background: rgba(21, 32, 43, 0.9);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            z-index: 10;
        }
        /* プロフィール編集エリア */
        .profile-edit {
            padding: 15px;
            background: #192734;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        .profile-edit input {
            background: #15202b;
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 8px;
            padding: 8px;
            width: 100%;
            box-sizing: border-box;
        }
        .editor-section { padding: 15px; border-bottom: 8px solid #253341; }
        textarea {
            width: 100%;
            height: 100px;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.2rem;
            resize: none;
            outline: none;
        }
        .btn-post, .btn-small {
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-small { padding: 8px 15px; font-size: 0.8rem; }
        .post-card {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
        }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #333;
            object-fit: cover;
            border: 1px solid var(--border-color);
        }
        .post-content { flex: 1; }
        .user-info { font-weight: bold; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
        .post-text { line-height: 1.4; margin-bottom: 10px; white-space: pre-wrap; word-break: break-word; }
        .like-button {
            background: none;
            border: none;
            color: var(--secondary-text);
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
        }
        .like-button.active { color: #e0245e; }
        .login-screen { text-align: center; margin-top: 100px; }
    </style>
</head>
<body>

    <div id="app" class="container">
        <div id="login-ui" class="login-screen" style="display: none;">
            <h1>Family English Diary 🐶</h1>
            <p style="color: var(--secondary-text);">Share your daily life in English!</p>
            <button class="btn-post" onclick="login()">Login with Google</button>
        </div>

        <div id="main-ui" style="display: none;">
            <header>
                <strong>Home</strong>
                <button onclick="logout()" style="background:none; border:none; color:var(--secondary-text); cursor:pointer;">Logout</button>
            </header>

            <div class="profile-edit">
                <input type="text" id="usernameInput" placeholder="Name (e.g. TARA)">
                <input type="text" id="avatarInput" placeholder="Avatar URL (https://...)">
                <div style="text-align: right;">
                    <button class="btn-small" onclick="updateProfile()">Save Profile</button>
                </div>
            </div>

            <div class="editor-section">
                <textarea id="diaryInput" placeholder="Write in English..."></textarea>
                <div style="text-align: right;">
                    <button id="postBtn" class="btn-post" onclick="postDiary()">Post</button>
                </div>
            </div>

            <div id="postList"></div>
        </div>
    </div>

    <script>
        // --- 設定：ここを自分のものに書き換えてワン！ ---
        const SUPABASE_URL = 'https://rbrpsccwwyldytcxmzae.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJicnBzY2N3d3lsZHl0Y3htemFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3Mzg1MzIsImV4cCI6MjA5NDMxNDUzMn0.lUHu3BcfTmLfkw_Cfp1yamnPoFzicKvQBBrugpjKB4Q';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;

        // 初期化
        window.onload = async () => {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                currentUser = session.user;
                document.getElementById('main-ui').style.display = 'block';
                await loadMyProfile(session.user);
                fetchDiaries();
            } else {
                document.getElementById('login-ui').style.display = 'block';
            }
        };

        async function login() { await _supabase.auth.signInWithOAuth({ provider: 'google' }); }
        async function logout() { await _supabase.auth.signOut(); location.reload(); }

        // プロフィールの読み込みと初期登録
        async function loadMyProfile(user) {
            const { data } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
            if (data) {
                document.getElementById('usernameInput').value = data.username || "";
                document.getElementById('avatarInput').value = data.avatar_url || "";
            } else {
                const initialName = user.user_metadata.full_name || 'New User';
                const initialAvatar = user.user_metadata.avatar_url || '';
                await _supabase.from('profiles').insert([{
                    id: user.id,
                    username: initialName,
                    avatar_url: initialAvatar
                }]);
                document.getElementById('usernameInput').value = initialName;
                document.getElementById('avatarInput').value = initialAvatar;
            }
        }

        // プロフィール更新
        async function updateProfile() {
            const newName = document.getElementById('usernameInput').value;
            const newAvatar = document.getElementById('avatarInput').value;
            if (!newName) return alert("Name is required!");

            const { error } = await _supabase
                .from('profiles')
                .update({ username: newName, avatar_url: newAvatar })
                .eq('id', currentUser.id);

            if (error) alert("Error updating profile: " + error.message);
            else {
                alert("Profile saved! ✨");
                fetchDiaries();
            }
        }

        // 日記取得（いいね情報とプロフィールを合体させて取得）
        async function fetchDiaries() {
            const { data, error } = await _supabase
                .from('posts')
                .select('id, text, created_at, user_id, profiles(username, avatar_url), likes(user_id)')
                .order('created_at', { ascending: false });

            if (error) return console.error("Fetch error:", error);

            const list = document.getElementById('postList');
            list.innerHTML = "";
            data.forEach(post => {
                // 自分がいいねしているか判定
                const isLiked = post.likes?.some(l => l.user_id === currentUser?.id);
                // 画像が割れないようにデフォルト画像を用意
                const avatar = post.profiles?.avatar_url || `https://ui-avatars.com/api/?name=${post.profiles?.username || 'U'}&background=random`;

                const div = document.createElement('div');
                div.className = 'post-card';
                div.innerHTML = `
                    <img src="${avatar}" class="avatar" onerror="this.src='https://via.placeholder.com/48?text=?'">
                    <div class="post-content">
                        <div class="user-info">${escapeHtml(post.profiles?.username || 'Unknown')}</div>
                        <div class="post-text">${escapeHtml(post.text)}</div>
                        <button class="like-button ${isLiked ? 'active' : ''}" onclick="toggleLike('${post.id}', ${isLiked})">
                            ${isLiked ? '❤️' : '🤍'} ${post.likes?.length || 0} Likes
                        </button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        // 投稿
        async function postDiary() {
            const input = document.getElementById('diaryInput');
            const btn = document.getElementById('postBtn');
            if (!input.value.trim()) return;

            btn.disabled = true;
            const { error } = await _supabase.from('posts').insert([{
                text: input.value,
                user_id: currentUser.id
            }]);

            if (error) alert("Post error: " + error.message);
            else {
                input.value = "";
                fetchDiaries();
            }
            btn.disabled = false;
        }

        // いいねの切り替え
        async function toggleLike(postId, isLiked) {
            if (isLiked) {
                await _supabase.from('likes').delete().eq('post_id', postId).eq('user_id', currentUser.id);
            } else {
                await _supabase.from('likes').insert([{ post_id: postId, user_id: currentUser.id }]);
            }
            fetchDiaries();
        }

        // セキュリティ対策：HTMLエスケープ
        function escapeHtml(str) {
            const p = document.createElement('p');
            p.textContent = str;
            return p.innerHTML;
        }
    </script>
</body>
</html>
