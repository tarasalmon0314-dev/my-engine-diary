<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Diary SNS - Debug Version</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-color: #15202b; --primary-color: #1d9bf0; --text-color: #ffffff; --border-color: #38444d; }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        textarea { width: 100%; height: 100px; background: #192734; border: 1px solid var(--border-color); color: white; border-radius: 15px; padding: 10px; box-sizing: border-box; }
        button { background: var(--primary-color); color: white; border: none; border-radius: 20px; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        .post-card { border-bottom: 1px solid var(--border-color); padding: 15px; display: flex; gap: 10px; width: 100%; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: #333; object-fit: cover; }
        .error-msg { color: #ffadad; background: rgba(255,0,0,0.1); padding: 10px; border-radius: 10px; margin: 10px 0; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="container" id="main">
        <h2 id="status">Loading...</h2>
        <div id="debug-area"></div>
        <div id="editor"></div>
        <div id="postList"></div>
    </div>

    <script>
        const SUPABASE_URL = 'あなたのProject URL'; 
        const SUPABASE_KEY = 'あなたのanon public Key';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.onload = async () => {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                document.getElementById('status').innerText = "Logged in 📝";
                renderEditor(session.user);
                fetchDiaries();
            } else {
                document.getElementById('status').innerHTML = '<button onclick="login()">Login with Google</button>';
            }
        };

        async function login() { await _supabase.auth.signInWithOAuth({ provider: 'google' }); }

        function renderEditor(user) {
            document.getElementById('editor').innerHTML = `
                <textarea id="diaryInput" placeholder="Write in English..."></textarea>
                <div style="text-align:right; margin-top:10px;">
                    <button onclick="postDiary()">Post</button>
                </div>
            `;
        }

        async function fetchDiaries() {
            // ここでエラーの詳細を捕まえるワン！
            const { data, error } = await _supabase
                .from('posts')
                .select(`
                    id, 
                    text, 
                    created_at, 
                    user_id,
                    profiles ( username, avatar_url ),
                    likes ( user_id )
                `)
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Fetch Error:", error);
                document.getElementById('debug-area').innerHTML = `
                    <div class="error-msg">
                        <strong>Fetch Error (400):</strong> ${error.message}<br>
                        <small>Hint: Check if 'profiles' or 'likes' table has correct Foreign Keys.</small>
                    </div>`;
                return;
            }

            const list = document.getElementById('postList');
            list.innerHTML = "";
            data.forEach(post => {
                const div = document.createElement('div');
                div.className = 'post-card';
                div.innerHTML = `
                    <img src="${post.profiles?.avatar_url || ''}" class="avatar">
                    <div>
                        <strong>${post.profiles?.username || 'Unknown'}</strong>
                        <p>${post.text}</p>
                        <small style="color:#8899a6;">❤️ ${post.likes?.length || 0} Likes</small>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        async function postDiary() {
            const text = document.getElementById('diaryInput').value;
            const { data: { session } } = await _supabase.auth.getSession();
            if (!text || !session) return;

            const { error } = await _supabase.from('posts').insert([{ text, user_id: session.user.id }]);
            if (error) alert("Post Error: " + error.message);
            else {
                document.getElementById('diaryInput').value = "";
                fetchDiaries();
            }
        }
    </script>
</body>
</html>
